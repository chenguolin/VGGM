opt_type: "wan2.1_t2v_1.3b_ode"

optimizer:
  name: "adamw"
  lr: 0.000002
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.01

lr_scheduler:
  name: "constant"

train:
  batch_size_per_gpu: 2
  gradient_accumulation_steps: 1
  use_deepspeed: true
  zero_stage: 2
  epochs: 1000
  log_freq: 1
  early_eval_freq: 100
  early_eval: 1000
  eval_freq: 500
  save_freq: 2000
  eval_freq_epoch: 5
  save_freq_epoch: 10
  use_ema: true
  ema_kwargs:
    decay: 0.9999
    use_ema_warmup: true
    inv_gamma: 1.
    power: 0.75

val:
  batch_size_per_gpu: 1
