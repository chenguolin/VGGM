opt_type: "wan2.1_t2v_1.3b"

optimizer:
  name: "adamw"
  lr: 0.0001
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.01

lr_scheduler:
  name: "cosine_warmup"
  num_warmup_steps: 1000

train:
  batch_size_per_gpu: 2
  gradient_accumulation_steps: 1
  sharding_strategy: "hybrid_full"
  wrap_strategy: "transformer"
  epochs: 10
  log_freq: 1
  early_eval_freq: 100
  early_eval: 1000
  eval_freq: 500
  save_freq: 2000
  eval_freq_epoch: 5
  save_freq_epoch: 10
  use_ema: true
  ema_weight: 0.999
  ema_start_step: 0
  max_loss: 1.

val:
  batch_size_per_gpu: 1
